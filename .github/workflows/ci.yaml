name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

jobs:
  quality:
    name: Lint ${{ matrix.project }} (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
  
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: "VAE"
            python:
        fail-fast: false


    defaults:
      run:
        working-directory: ${{ matrix.project }}
    
    steps:
      - uses: actions/checkout@v4 
    
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: uv sync --frozen
      
      - name: Check Formatting
        run: uv run ruff format --check .
      
      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Type Check
        run: uv run mypy .